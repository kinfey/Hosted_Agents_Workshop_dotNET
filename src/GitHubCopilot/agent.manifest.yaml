# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: github-copilot-readiness-coach
displayName: "GitHub Copilot Readiness Coach"
description: >
  A getting-started hosted agent that uses the GitHub Copilot SDK with the
  Microsoft Agent Framework and an AG-UI endpoint. It uses gpt-5.5 and
  deterministic .NET function tools from WorkshopLab.GitHubCopilot.Core to
  provide beginner-friendly readiness guidance for Copilot-backed agent
  workshops.
metadata:
  tags:
    - AI Agent Hosting
    - GitHub Copilot SDK
    - Microsoft Agent Framework
    - AG-UI
    - Readiness
template:
  name: github-copilot-readiness-coach
  kind: hosted
  protocols:
    - protocol: ag-ui
      version: v1
  environment_variables:
    - name: GITHUB_TOKEN
      value: ${GITHUB_TOKEN}
    - name: GITHUB_COPILOT_MODEL
      value: gpt-5.5
    - name: AGUI__EndpointPath
      value: /ag-ui
    - name: COPILOT_CLI_PATH
      value: ${COPILOT_CLI_PATH}
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-5.5
    name: github-copilot-chat