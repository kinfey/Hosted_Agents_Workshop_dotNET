name: github-copilot-readiness-coach
displayName: "GitHub Copilot Readiness Coach"
description: >
  A starter AG-UI hosted app that uses GitHub Copilot gpt-5.5 with
  deterministic .NET function tools for workshop readiness guidance.
metadata:
  authors:
    - Workshop Lab
  tags:
    - GitHub Copilot
    - Microsoft Agent Framework
    - AG-UI
    - Readiness
template:
  name: github-copilot-readiness-coach
  kind: hosted
  protocols:
    - protocol: ag-ui
      version: v1
  environment_variables:
    - name: GITHUB_COPILOT_MODEL
      value: gpt-5.5
    - name: AGUI__EndpointPath
      value: /ag-ui
resources:
  - kind: model
    id: gpt-5.5
    name: github-copilot-chat
