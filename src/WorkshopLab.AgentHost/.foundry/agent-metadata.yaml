defaultEnvironment: dev
environments:
  dev:
    projectEndpoint: https://<account>.services.ai.azure.com/api/projects/<project>
    agentName: hosted-agent-readiness-coach
    azureContainerRegistry: <your-acr-name>.azurecr.io
    testCases:
      - id: smoke-core
        priority: P0
        dataset: hosted-agent-readiness-coach-eval-seed
        datasetVersion: v1
        datasetFile: .foundry/datasets/hosted-agent-readiness-coach-eval-seed-v1.jsonl
        datasetUri: pending
        evaluators:
          - name: intent_resolution
            threshold: 4
          - name: task_adherence
            threshold: 4
          - name: indirect_attack
            threshold: 1
